<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home · Bestandsvergleich</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="kern.js"></script>
<style>
:root{--bg:#F4F3F0;--card:#fff;--line:#E7E5DF;--ink:#23262B;--mut:#8B8E94;--mut2:#5c5f66;--ak:#2C4A8F;--gruen:#1C7A4D;--amber:#A06514;--rot:#B3372B;--mono:ui-monospace,'SF Mono',Menlo,monospace}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,'Segoe UI',Roboto,sans-serif;min-height:100vh}
button{font-family:inherit;cursor:pointer}
.shell{max-width:1120px;margin:0 auto;padding:18px 22px 30px}
.top{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px}
.top h1{margin:0;font-size:17px;font-weight:600}
.top h1 small{font-weight:400;font-size:12px;color:var(--mut)}
.top select{border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:12.5px;background:#fff;color:var(--ink)}
.tools{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin:12px 0 14px}
.btn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 13px;font-size:12.5px;font-weight:500;color:var(--ink)}
.btn:hover{border-color:#CFCDC6}
.btn.ak{background:#23262B;border-color:#23262B;color:#fff;font-weight:600}
.tools select{border:1px solid var(--line);border-radius:9px;padding:7px 10px;font-size:12.5px;background:#fff;color:var(--ink);font-weight:600;max-width:230px}
.tools .sep{width:1px;height:22px;background:var(--line)}
.grid{display:grid;grid-template-columns:1.15fr 1fr;gap:12px}
.tile{border-radius:16px;min-width:0}
.t-bilanz{background:#23262B;color:#F4F3F0;padding:16px 18px;display:flex;gap:18px;align-items:center}
.t-bilanz .l{font-size:10.5px;letter-spacing:.08em;color:#9B9EA5;margin-bottom:8px}
.bz{display:flex;gap:26px;flex-wrap:wrap}
.bz .v{font-family:var(--mono);font-size:21px;font-weight:600}
.bz small{display:block;font-size:11px;color:#9B9EA5;font-weight:400}
.bar{height:8px;border-radius:99px;background:#3A3E45;overflow:hidden;margin-top:12px}
.bar i{display:block;height:100%;background:linear-gradient(90deg,#6FE0A8,#8FB6FF)}
.t-bilanz .fuss{font-size:11.5px;color:#9B9EA5;margin-top:9px}
.t-bilanz .fuss a{color:#F4F3F0}
.ring{flex:none;text-align:center}
.ring b{display:block;font-size:11px;margin-top:4px;color:#C9CCD2;font-weight:600}
.t-fristen{background:var(--card);border:1px solid var(--line);padding:14px 16px}
.t-fristen .l{font-size:10.5px;letter-spacing:.08em;color:var(--mut);margin-bottom:6px}
.frow{display:flex;justify-content:space-between;align-items:center;padding:7px 4px;border-bottom:1px solid #F0EEE8;font-size:12.5px;gap:8px;cursor:pointer;border-radius:8px}
.frow:hover{background:#F7F6F2}
.frow:last-child{border-bottom:none}
.frow .w{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill{flex:none;font-size:10.5px;font-weight:600;border-radius:99px;padding:2px 9px}
.pill.rot{background:#FBE9E7;color:var(--rot)}
.pill.amber{background:#FBF2DC;color:var(--amber)}
.pill.gr{background:#EDF1EA;color:#4C6B52}
.fleer{color:var(--mut);font-size:12.5px;padding:8px 0}
.t-add{grid-column:1/-1;border:2px dashed #C6CBD5;border-radius:16px;background:#FCFCFA;padding:15px 16px;display:flex;align-items:center;justify-content:center;gap:13px;cursor:pointer;color:var(--ink);font:inherit;transition:border-color .12s,background .12s,transform .06s}
.t-add:hover{border-color:var(--ak);background:#F4F6FB}
.t-add:active{transform:scale(.995)}
.t-add .plus{width:36px;height:36px;border-radius:11px;background:#23262B;color:#fff;font-size:21px;font-weight:600;display:flex;align-items:center;justify-content:center;flex:none;line-height:1}
.t-add b{font-size:15px;display:block}
.t-add small{display:block;font-size:11.5px;color:var(--mut);font-weight:400;margin-top:1px}
.t-schnell{grid-column:1/-1;background:var(--card);border:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.t-schnell .l{font-size:10.5px;letter-spacing:.08em;color:var(--mut);flex:none}
.schnell{flex:1;display:flex;gap:7px;min-width:260px}
.schnell input{flex:1;min-width:0;border:1px solid var(--line);border-radius:9px;padding:8px 11px;font-size:12.5px}
.schnell button{border:none;border-radius:9px;background:#23262B;color:#fff;padding:8px 15px;font-size:12.5px;font-weight:600}
.bzone{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 16px;margin-top:12px}
.bz-kopf{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.bz-kopf .l{font-size:10.5px;letter-spacing:.08em;color:var(--mut)}
.bz-kopf .neu{color:var(--ak);font-weight:600;font-size:12.5px;cursor:pointer;border:none;background:none}
.brow{display:grid;grid-template-columns:46px 1.25fr 105px 165px 70px;gap:10px;align-items:center;padding:8px 6px;border-bottom:1px solid #F0EEE8;font-size:12.5px;cursor:pointer;border-radius:9px}
.brow:last-of-type{border-bottom:none}
.brow:hover{background:#F7F6F2}
.bk{font-size:10px;font-weight:700;background:#EEF1F6;color:#5A6478;border-radius:5px;padding:2px 0;text-align:center}
.bges b{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bges small{color:var(--mut);font-family:var(--mono);font-size:11px}
.bgeld{font-family:var(--mono);font-size:12px;text-align:right;white-space:nowrap}
.bdelta{font-family:var(--mono);font-size:12.5px;font-weight:600;text-align:right}
.bdelta.gr{color:var(--gruen)}
.bdelta.rd{color:var(--rot)}
.bdelta.mut{color:#B9BBBF;font-weight:400}
.bleer{color:var(--mut);font-size:12.5px;padding:10px 4px}
#kernfehlt{display:none;margin:12px 0;background:#FBE9E7;color:var(--rot);border-radius:9px;padding:10px 14px;font-size:13px}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#23262B;color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:60}
#toast.show{opacity:1}
@media (max-width:860px){.grid{grid-template-columns:1fr}.brow{grid-template-columns:46px 1.3fr 150px 64px}.brow .babl{display:none}}
</style>
</head>
<body>
<div id="app">
<div class="shell">
  <div class="top">
    <h1>Home <small id="datum"></small></h1>
    <select id="ansichtSel" aria-label="Ansicht wählen"></select>
  </div>
  <div id="kernfehlt">kern.js konnte nicht geladen werden — bitte prüfen, ob die Datei mit im Repo liegt.</div>

  <div class="tools">
    <select id="kundeSel" aria-label="Aktiver Kunde"></select>
    <button class="btn" id="btnKVerw" title="Kunden anlegen, wechseln, löschen">Kunden verwalten</button>
    <span class="sep"></span>
    <button class="btn" id="btnWord">Word-Vergleich</button>
    <button class="btn" id="btnPrint">Drucken / PDF</button>
    <button class="btn" id="btnSammel">Sammel-Kündigung</button>
    <span class="sep"></span>
    <button class="btn" id="btnKundeNeu">+ Neuer Kunde</button>
  </div>

  <div class="grid">
    <div class="tile t-bilanz">
      <div style="flex:1;min-width:0">
        <div class="l" id="bilanzL">JAHRESBILANZ</div>
        <div class="bz">
          <div><small>Bisher</small><span class="v" id="vF">—</span></div>
          <div><small>R+V</small><span class="v" id="vR" style="color:#8FB6FF">—</span></div>
          <div><small>Ersparnis</small><span class="v" id="vS" style="color:#6FE0A8">—</span></div>
        </div>
        <div class="bar"><i id="barI" style="width:0%"></i></div>
        <div class="fuss" id="barTxt"></div>
      </div>
      <div class="ring">
        <svg width="64" height="64" viewBox="0 0 60 60" role="img" aria-label="Ersparnisquote"><circle cx="30" cy="30" r="24" fill="none" stroke="#3A3E45" stroke-width="8"/><circle id="ringC" cx="30" cy="30" r="24" fill="none" stroke="#6FE0A8" stroke-width="8" stroke-linecap="round" stroke-dasharray="0 151" transform="rotate(-90 30 30)"/></svg>
        <b id="ringTxt">—</b>
      </div>
    </div>

    <div class="tile t-fristen">
      <div class="l">FRISTEN-RADAR · ALLE KUNDEN · 90 TAGE</div>
      <div id="fristen"></div>
    </div>

    <button class="t-add" id="btnVertragGross" type="button">
      <span class="plus" aria-hidden="true">+</span>
      <span style="text-align:left"><b>Vertrag erfassen</b><small id="addSub">Öffnet den Vertrags-Editor</small></span>
    </button>

    <div class="tile t-schnell">
      <span class="l">SCHNELLERFASSUNG (COPILOT)</span>
      <div class="schnell">
        <input id="schnellIn" type="text" placeholder="z. B. „phv allianz 737373, 60 € jährlich, ablauf 23.10.26“">
        <button id="schnellGo">Erfassen</button>
      </div>
    </div>
  </div>

  <div class="bzone" id="bestandZone">
    <div class="bz-kopf">
      <span class="l" id="bzTitel">BESTAND</span>
      <button class="neu" id="bzNeu">+ Vertrag</button>
    </div>
    <div id="bzListe"></div>
  </div>
</div>
</div>

<div id="toast" role="status"></div>

<script>
'use strict';
const $ = id => document.getElementById(id);
const hatKern = !!window.BVK;
if(!hatKern) $('kernfehlt').style.display = 'block';
try{ localStorage.setItem('bv_ansicht', 'home'); }catch(e){}

function esc(s){ return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(m){
  const t = $('toast');
  t.textContent = m;
  t.classList.add('show');
  clearTimeout(toast._h);
  toast._h = setTimeout(() => t.classList.remove('show'), 2200);
}
$('datum').textContent = new Date().toLocaleDateString('de-DE', {weekday:'long', day:'numeric', month:'long'});

function alleKunden(){
  return hatKern ? BVK.liste().map(k => ({ meta: k, st: BVK.stateVon(k.id) })) : [];
}
function oeffneEditor(kid, pid){
  if(!hatKern) return;
  BVK.vertragDialog({
    kundeId: kid,
    policyId: pid,
    onDone: (k, id, art) => {
      render();
      toast(art === 'geloescht' ? 'Vertrag gelöscht.' : 'Vertrag gespeichert.');
    }
  });
}
let kundeSig = '';
function renderKundeSel(){
  const l = BVK.liste();
  const sig = l.map(k => k.id + '#' + k.name + '#' + k.anzahl).join('|') + '@' + BVK.aktivId();
  if(sig === kundeSig) return;
  kundeSig = sig;
  const sel = $('kundeSel');
  sel.innerHTML = '';
  l.forEach(k => {
    const o = document.createElement('option');
    o.value = k.id;
    o.textContent = k.name + ' (' + k.anzahl + ')';
    sel.appendChild(o);
  });
  sel.value = BVK.aktivId();
}
function renderBestand(st){
  $('bzTitel').textContent = 'BESTAND · ' + ((st.kunde || 'Unbenannter Kunde').toUpperCase());
  const w = $('bzListe');
  w.innerHTML = '';
  const arr = [...st.policies].sort((a, b) => (a.created || 0) - (b.created || 0));
  if(!arr.length){
    w.innerHTML = '<div class="bleer">Noch keine Verträge — oben „+ Vertrag" öffnet den Editor.</div>';
    return;
  }
  const heute = new Date();
  arr.forEach(p => {
    const row = document.createElement('div');
    row.className = 'brow';
    const aF = BVK.annual(p, 'f'), aR = BVK.annual(p, 'rv');
    let ablHtml = p.ablauf ? BVK.fmtDate(p.ablauf) : '—';
    const f = BVK.fristDate(p);
    if(f){
      const tage = Math.round((f - heute) / 864e5);
      if(tage <= 90) ablHtml += ' <span class="pill ' + (tage <= 14 ? 'rot' : 'amber') + '" style="padding:1px 7px">' + (tage < 0 ? 'vorbei' : tage + ' T.') + '</span>';
    }
    let dCls = 'mut', dTxt = '—';
    if(aF != null && aR != null){
      const diff = aF - aR;
      dCls = diff >= 0 ? 'gr' : 'rd';
      dTxt = (diff >= 0 ? '−' : '+') + BVK.fmtNum(Math.abs(diff));
    }
    row.innerHTML =
      '<span class="bk">' + esc(BVK.sparteOf(p).k) + '</span>' +
      '<span class="bges"><b>' + esc(p.gesellschaft || '—') + '</b><small>' + esc(p.vsnr || '') + '</small></span>' +
      '<span class="babl" style="font-size:11.5px;color:var(--mut2)">' + ablHtml + '</span>' +
      '<span class="bgeld">' + (aF != null ? BVK.fmtNum(aF) : '—') + ' → ' + (aR != null ? '<b style="color:var(--ak)">' + BVK.fmtNum(aR) + '</b>' : '—') + ' €/J</span>' +
      '<span class="bdelta ' + dCls + '">' + dTxt + '</span>';
    row.addEventListener('click', () => oeffneEditor(BVK.aktivId(), p.id));
    w.appendChild(row);
  });
}
function render(){
  if(!hatKern) return;
  renderKundeSel();
  const st = BVK.ensureStateShape(BVK.aktiverState());
  $('bilanzL').textContent = ((st.kunde || 'Unbenannter Kunde').toUpperCase()) + ' · JAHRESBILANZ';
  const t = BVK.totals(st);
  $('vF').textContent = t.f == null ? '—' : BVK.fmtNum(t.f) + ' €';
  $('vR').textContent = t.r == null ? '—' : BVK.fmtNum(t.r) + ' €';
  $('vS').textContent = t.save == null ? '—' : (t.save >= 0 ? '−' : '+') + BVK.fmtNum(Math.abs(t.save)) + ' €';
  let q = 0;
  if(t.f && t.save != null && t.save > 0) q = Math.max(0, Math.min(100, Math.round(t.save / t.f * 100)));
  $('barI').style.width = q + '%';
  $('barTxt').innerHTML = q > 0
    ? q + ' % günstiger über die verglichenen Verträge · <a href="#bestandZone">zum Bestand ↓</a>'
    : '<a href="#bestandZone" style="color:#F4F3F0">Ersten Vertrag im Bestand erfassen ↓</a>';
  const ring = 2 * Math.PI * 24;
  $('ringC').setAttribute('stroke-dasharray', (ring * q / 100).toFixed(1) + ' ' + ring.toFixed(1));
  $('ringTxt').textContent = q > 0 ? q + ' % Ersparnis' : 'noch offen';

  $('addSub').textContent = 'Öffnet den Vertrags-Editor für ' + ((st.kunde || '').trim() || 'den aktiven Kunden');

  const heute = new Date();
  const fr = [];
  alleKunden().forEach(({meta, st}) => {
    (st.policies || []).forEach(p => {
      const f = BVK.fristDate(p);
      if(!f) return;
      const tage = Math.round((f - heute) / 864e5);
      if(tage >= -14 && tage <= 90) fr.push({ tage, p, kunde: meta.name, kid: meta.id });
    });
  });
  fr.sort((a, b) => a.tage - b.tage);
  const fw = $('fristen');
  fw.innerHTML = fr.length ? '' : '<div class="fleer">Keine Kündigungsfristen in den nächsten 90 Tagen.</div>';
  fr.slice(0, 6).forEach(x => {
    const row = document.createElement('div');
    row.className = 'frow';
    const cls = x.tage <= 14 ? 'rot' : (x.tage <= 45 ? 'amber' : 'gr');
    row.innerHTML = '<span class="w"><b>' + esc(BVK.displayName(x.p)) + '</b> · ' + esc(x.p.gesellschaft || '—') + ' · ' + esc(x.kunde) + '</span>' +
      '<span class="pill ' + cls + '">' + (x.tage < 0 ? 'Frist vorbei' : 'noch ' + x.tage + ' Tage') + '</span>';
    row.addEventListener('click', () => oeffneEditor(x.kid, x.p.id));
    fw.appendChild(row);
  });

  renderBestand(st);
}

/* ---------- Aktionen ---------- */
$('kundeSel').addEventListener('change', e => {
  if(!hatKern) return;
  BVK.setAktiv(e.target.value);
  render();
});
$('btnKVerw').addEventListener('click', () => {
  if(!hatKern) return;
  BVK.kundenDialog({ onChange: render });
});
$('bzNeu').addEventListener('click', () => oeffneEditor(hatKern ? BVK.aktivId() : null, null));
$('btnVertragGross').addEventListener('click', () => oeffneEditor(hatKern ? BVK.aktivId() : null, null));
$('btnWord').addEventListener('click', async () => {
  if(!hatKern) return;
  const st = BVK.ensureStateShape(BVK.aktiverState());
  if(!st.policies.length){ toast('Der aktive Kunde hat noch keine Verträge.'); return; }
  try{ await BVK.exportVergleichDocx(st); toast('Word-Datei erstellt.'); }
  catch(e){ toast('Export fehlgeschlagen — Internetverbindung nötig.'); }
});
$('btnPrint').addEventListener('click', () => {
  if(!hatKern) return;
  const st = BVK.ensureStateShape(BVK.aktiverState());
  if(!st.policies.length){ toast('Der aktive Kunde hat noch keine Verträge.'); return; }
  BVK.druckeVergleich(st);
});
$('btnSammel').addEventListener('click', () => {
  if(!hatKern) return;
  BVK.sammelDialog({ onDone: n => { render(); toast(n + ' Kündigung' + (n === 1 ? '' : 'en') + ' erstellt.'); } });
});
$('btnKundeNeu').addEventListener('click', () => {
  if(!hatKern) return;
  const n = prompt('Name des neuen Kunden:', '');
  if(n === null) return;
  BVK.neu((n || '').trim());
  render();
  toast('Kunde angelegt und aktiviert.');
});
$('schnellGo').addEventListener('click', () => {
  const v = $('schnellIn').value.trim();
  try{ sessionStorage.setItem('bv_copilot_prefill', v); }catch(e){}
  location.href = 'copilot.html';
});
$('schnellIn').addEventListener('keydown', e => { if(e.key === 'Enter') $('schnellGo').click(); });
if(hatKern) BVK.ansichtMenu($('ansichtSel'), 'home');
function resync(){ if(hatKern){ BVK.reload(); render(); } }
window.addEventListener('storage', e => { if(e.key === 'bv_kunden_v1' || e.key === 'bv_kunde_aktiv_v1') resync(); });
window.addEventListener('pageshow', e => { if(e.persisted) resync(); });
window.addEventListener('focus', resync);
document.addEventListener('visibilitychange', () => { if(!document.hidden) resync(); });
render();
</script>
</body>
</html>
